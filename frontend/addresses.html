<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FullOven - Меню</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://googleapis.com" rel="stylesheet">
</head>
<body>

<header class="header">
        <div class="container header-content">
            <div class="logo">
            <a href="index.html" style="text-decoration: none; color: inherit;">
            <div class="logo-top">
            <span class="logo-name">FULL OVEN</span>
            <img src="images/Group.svg" alt="icon" class="logo-icon">
        </div>
        <p class="logo-sub">Ресторан русской кухни</p>
    </a>
</div>

            <nav class="nav">
                <a href="index.html" class="nav-link">главная</a>
                <a href="menu.html" class="nav-link">меню</a>
                <a href="addresses.html" class="nav-link active">наши места</a>
                <a href="reservation.html" class="nav-link">бронирование</a>
                <a href="connection.html" class="nav-link">контакты</a>
                <div class="nav-underline"></div>
            </nav>
        </div>
    </header>

    

<section class="places-page">
    <div class="container">
        <div class="menu-title-block">
            <h1 class="section-title">Наши заведения</h1>
            <div class="title-underline"></div>
        </div>

        <div class="places-grid">
            <!-- Заведение 1 -->
            <div class="place-card">
                <div class="place-info">
                    <h3>Элитный центр</h3>
                    <p>Ул. Императорская, д. 3, стр. 1<br>г. Москва, 119019</p>
                </div>
                <img src="images/image 10.png" alt="Центр" class="place-img">
            </div>

            <!-- Заведение 2 -->
            <div class="place-card">
                <div class="place-info">
                    <h3>Уютный район</h3>
                    <p>Ул. Липовая Аллея, д. 27<br>г. Нижний Новгород, 603105</p>
                </div>
                <img src="images/image 11.png" alt="Район" class="place-img">
            </div>

            <!-- Заведение 3 -->
            <div class="place-card">
                <div class="place-info">
                    <h3>Туристический</h3>
                    <p>Центральная Набережная, д. 12<br>г. Сочи, 354000</p>
                </div>
                <img src="images/image 12.png" alt="Сочи" class="place-img">
            </div>
        </div>
    </div>
</section>

<script>
        const nav = document.querySelector('.nav');
        const links = document.querySelectorAll('.nav-link');
        const underline = document.querySelector('.nav-underline');

        function moveUnderline(element) {
            underline.style.left = element.offsetLeft + 'px';
            underline.style.width = element.offsetWidth + 'px';
        }

        window.addEventListener('load', () => moveUnderline(document.querySelector('.nav-link.active')));

        links.forEach(link => {
            link.addEventListener('click', () => {
                links.forEach(l => l.classList.remove('active'));
                link.classList.add('active');
                moveUnderline(link);
            });
        });
    </script>

</body>
</html>
